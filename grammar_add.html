<!DOCTYPE html>

<head>

    <title>文法追加</title>

    <link rel="stylesheet" href="style.css">

    <script src="db.js"></script>
    <script src="grammar.js" defer></script>

<body>

<div class="page-container">

    <h1 class="page-title">
        文法追加
    </h1>

    <div class="form-card">

        <label>文法</label>
        <input type="text" id="grammar">

        <textarea id="meaning"></textarea>

        <label>例文</label>
        <textarea id="example"></textarea>

        <label>メモ</label>
        <textarea id="memo"></textarea>

        <button
            class="save-btn"
            onclick="saveGrammar()">

            保存
        </button>

    </div>

    <a href="grammar.html" class="back-btn">
        ← 戻る
    </a>
